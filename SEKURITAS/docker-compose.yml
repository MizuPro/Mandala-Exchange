services:
  postgres:
    image: postgres:16-alpine
    container_name: mandala-sekuritas-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mandala_sekuritas
    ports:
      - "5432:5432"
    volumes:
      - sekuritas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mandala_sekuritas"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sekuritas_postgres_data:

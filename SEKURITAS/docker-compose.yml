services:
  postgres:
    image: postgres:16-alpine
    container_name: ${SEKURITAS_POSTGRES_CONTAINER:-mandala-sekuritas-postgres}
    environment:
      POSTGRES_USER: ${SEKURITAS_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SEKURITAS_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${SEKURITAS_POSTGRES_DB:-mandala_sekuritas}
    ports:
      - "${SEKURITAS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - sekuritas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sekuritas_postgres_data:
    name: ${SEKURITAS_POSTGRES_VOLUME:-sekuritas_postgres_data}

version: '3.8'

services:
  postgres-bot:
    image: postgres:15-alpine
    container_name: mandala-bot-db
    environment:
      POSTGRES_USER: mandala_bot
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mandala_bot
    ports:
      - "5435:5432"
    volumes:
      - bot-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mandala_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bot-pgdata:

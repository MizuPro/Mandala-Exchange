services:
  postgres:
    image: postgres:16-alpine
    container_name: mandala-bei-postgres
    environment:
      POSTGRES_USER: mandala_bei
      POSTGRES_PASSWORD: mandala_bei
      POSTGRES_DB: mandala_bei
    ports:
      - "5441:5432"
    volumes:
      - bei_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mandala_bei -d mandala_bei"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bei_postgres_data:

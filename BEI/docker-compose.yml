services:
  postgres:
    image: postgres:16-alpine
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off -c shared_buffers=256MB
    container_name: ${BEI_POSTGRES_CONTAINER:-mandala-bei-postgres}
    environment:
      POSTGRES_USER: ${BEI_POSTGRES_USER:-mandala_bei}
      POSTGRES_PASSWORD: ${BEI_POSTGRES_PASSWORD:-mandala_bei}
      POSTGRES_DB: ${BEI_POSTGRES_DB:-mandala_bei}
    ports:
      - "${BEI_POSTGRES_PORT:-5441}:5432"
    volumes:
      - bei_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${BEI_REDIS_CONTAINER:-mandala-redis}
    ports:
      - "${BEI_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  bei_postgres_data:
    name: ${BEI_POSTGRES_VOLUME:-bei_postgres_data}
